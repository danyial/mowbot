# MowerBot Robot Parameters
# ESP32-C3-DevKitM-1 + BTS7960 H-Bridge + JGB37-520 Encoder Motors
# Pi HAT Design — UART Communication (no USB cable)

robot:
  ros__parameters:
    # Kinematik
    wheel_separation: 0.20          # Radabstand in Metern
    wheel_diameter: 0.07            # Raddurchmesser in Metern (70mm Raeder)
    wheel_radius: 0.035             # Radradius in Metern

    # Geschwindigkeitslimits
    max_linear_speed: 0.28          # m/s (76 RPM x pi x 0.07m / 60s)
    max_angular_speed: 1.5          # rad/s

    # Motor-Controller: BTS7960 H-Bruecke (ESP32-C3 GPIOs)
    motor_left_rpwm: 0              # GPIO0 -> J_SIG_L Pin 1
    motor_left_lpwm: 1              # GPIO1 -> J_SIG_L Pin 2
    motor_left_en: 2                # GPIO2 -> J_SIG_L Pin 3+4 (mit Pull-down R1)
    motor_right_rpwm: 3             # GPIO3 -> J_SIG_R Pin 1
    motor_right_lpwm: 4             # GPIO4 -> J_SIG_R Pin 2
    motor_right_en: 5               # GPIO5 -> J_SIG_R Pin 3+4 (mit Pull-down R2)

    # Encoder: JGB37-520 (11 Ticks pro Motor-Umdrehung)
    encoder_left_a: 6               # GPIO6 -> J_ENC_L Pin 1
    encoder_left_b: 7               # GPIO7 -> J_ENC_L Pin 2
    encoder_right_a: 10             # GPIO10 -> J_ENC_R Pin 1
    encoder_right_b: 9              # GPIO9 -> J_ENC_R Pin 2
    encoder_ticks_per_rev: 11       # Ticks pro Motor-Umdrehung

    # UART (ESP32-C3 <-> Raspberry Pi, via Pi HAT PCB traces)
    uart_rx_pin: 20                 # GPIO20 <- Pi GPIO14 (TXD)
    uart_tx_pin: 21                 # GPIO21 -> Pi GPIO15 (RXD)
    uart_baud_rate: 115200

    # WS2812 RGB Status LED (onboard ESP32-C3-DevKitM-1)
    led_pin: 8                      # GPIO8 — WS2812 addressable RGB
    led_brightness: 50              # 0-255

    # PWM
    pwm_frequency: 1000             # Hz (1 kHz fuer DC-Motoren)
    pwm_resolution: 8               # Bit (0-255)

    # Sicherheit
    cmd_vel_timeout_ms: 500         # Motoren stoppen nach X ms ohne cmd_vel
    tilt_threshold_deg: 15.0        # Kipp-Alarm Schwellenwert

    # Maehwerk (PoC: deaktiviert)
    mower_enabled: false
    mower_width: 0.20               # Messerbreite in Metern
    mower_overlap: 0.10             # Ueberlappung (0-1)
