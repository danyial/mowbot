x-ros-common: &ros-common
  restart: unless-stopped
  network_mode: host
  ipc: host
  pid: host
  environment:
    - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
  volumes:
    - ./config:/config:ro

services:

  # ============================================
  # micro-ROS Agent — ESP32-C3 Motorcontroller
  # Kommunikation via UART (Pi GPIO14/15 <-> ESP32-C3 GPIO20/21)
  # Pi Serial-Konsole muss deaktiviert sein:
  #   sudo raspi-config -> Interface Options -> Serial Port
  #   -> Login Shell: No, Hardware: Yes
  # ============================================
  micro-ros-agent:
    <<: *ros-common
    image: ghcr.io/danyial/mowbot/micro-ros-agent:latest
    container_name: mower-micro-ros
    devices:
      - ${ESP32_DEVICE:-/dev/ttyAMA0}:/dev/ttyAMA0
    command: >
      ros2 run micro_ros_agent micro_ros_agent
      serial --dev /dev/ttyAMA0 -b 115200

  # ============================================
  # GNSS — NMEA NavSat Driver (UM980)
  # ============================================
  gnss:
    <<: *ros-common
    image: ghcr.io/danyial/mowbot/gnss:latest
    container_name: mower-gnss
    devices:
      - ${GNSS_DEVICE:-/dev/ttyGNSS}:/dev/ttyGNSS
    volumes:
      - ./config/gnss_launch.py:/launch/gnss_launch.py:ro
    command: >
      ros2 launch /launch/gnss_launch.py
      port:=/dev/ttyGNSS
      baud:=${GNSS_BAUD:-115200}
      frame_id:=gps_link

  # ============================================
  # NTRIP — RTK-Korrekturdaten
  # ============================================
  ntrip:
    <<: *ros-common
    image: ghcr.io/danyial/mowbot/ntrip:latest
    container_name: mower-ntrip
    devices:
      - ${GNSS_DEVICE:-/dev/ttyGNSS}:/dev/ttyGNSS
    env_file:
      - ./config/ntrip.env
    depends_on:
      gnss:
        condition: service_started
    entrypoint: ["/entrypoint.sh"]

  # ============================================
  # IMU — MPU6050 Treiber
  # ============================================
  imu:
    <<: *ros-common
    image: ghcr.io/danyial/mowbot/imu:latest
    container_name: mower-imu
    devices:
      - /dev/i2c-1:/dev/i2c-1
    command: >
      ros2 run mpu6050driver mpu6050driver
      --ros-args
      -p i2c_bus:=1
      -p device_address:=${IMU_ADDRESS:-0x68}
      -p frequency:=${IMU_FREQUENCY:-30}

  # ============================================
  # Navigation — Nav2 + EKF Sensor-Fusion
  # ============================================
  nav:
    <<: *ros-common
    image: ghcr.io/danyial/mowbot/nav:latest
    container_name: mower-nav
    depends_on:
      - gnss
      - imu
      - micro-ros-agent
    volumes:
      - ./config:/config:ro
      - mower-data:/data
    command: >
      python3 /config/mower_nav_launch.py

  # ============================================
  # rosbridge — WebSocket Server
  # ============================================
  rosbridge:
    <<: *ros-common
    image: ghcr.io/danyial/mowbot/rosbridge:latest
    container_name: mower-rosbridge
    command: >
      ros2 launch rosbridge_server rosbridge_websocket_launch.xml

  # ============================================
  # foxglove_bridge — Foxglove WebSocket (native protocol, port 8765)
  # Alternative to rosbridge for Foxglove Studio: avoids the rosbridge_server
  # v2 JSON serializer bug on float[]-bearing messages (LaserScan, Odometry,
  # TFMessage). Web UI continues to use rosbridge on :9090.
  # ============================================
  foxglove_bridge:
    <<: *ros-common
    image: ghcr.io/danyial/mowbot/foxglove-bridge:humble
    container_name: mower-foxglove-bridge
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
      exec ros2 launch foxglove_bridge foxglove_bridge_launch.xml
      port:=8765 address:=0.0.0.0"

  # ============================================
  # MowControl — Web-App
  # ============================================
  web:
    image: ghcr.io/danyial/mowbot/web:latest
    container_name: mower-web
    restart: unless-stopped
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_ROSBRIDGE_URL=/rosbridge
      - ROSBRIDGE_URL=ws://localhost:9090
      - NTRIP_ENV_PATH=/app/config/ntrip.env
      # Phase 6 — guarantees label filter match regardless of compose
      # invocation cwd; docker-adapter reads this to build the
      # com.docker.compose.project=<name> filter.
      - COMPOSE_PROJECT_NAME=mowbot
    volumes:
      - ./config:/app/config
      - mower-data:/app/data
      # Phase 6 LOGS-01..04 — read-only docker.sock for the logs sidecar.
      # :ro + method allowlist in web/lib/server/docker-adapter.mjs.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - rosbridge

  # ============================================
  # LiDAR — LDROBOT LD19 2D-Scan
  # Pi GPIO4/5 (uart3) -> /dev/ttyLIDAR -> ldlidar_stl_ros2 -> /scan
  # ============================================
  lidar:
    <<: *ros-common
    build:
      context: ./docker/lidar
      args:
        LDLIDAR_SHA: bf668a89baf722a787dadc442860dcbf33a82f5a
    image: ghcr.io/danyial/mowbot/lidar:bf668a8
    container_name: mower-lidar
    devices:
      - ${LIDAR_DEVICE:-/dev/ttyLIDAR}:/dev/ttyLIDAR
    command: >
      ros2 launch /launch/lidar.launch.py

  # ============================================
  # SLAM — slam_toolbox online async mapping
  # Consumes /scan + (odom -> base_link TF), publishes /map + (map -> odom TF)
  # ============================================
  slam:
    <<: *ros-common
    build:
      context: ./docker/slam
    image: ghcr.io/danyial/mowbot/slam:humble-2.6.10
    container_name: mower-slam
    depends_on:
      lidar:
        condition: service_started
      nav:
        condition: service_started
      micro-ros-agent:
        condition: service_started
    command: >
      ros2 launch slam_toolbox online_async_launch.py
      slam_params_file:=/config/slam_toolbox_params.yaml
      use_sim_time:=false

volumes:
  mower-data:
    driver: local
